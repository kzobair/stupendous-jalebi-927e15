<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="patternGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2.5" fill="#c7d2fe" />
      <circle cx="15" cy="15" r="2.5" fill="#c7d2fe" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f5f3ff"/>
  
  <!-- Hanger -->
  <path d="M160,110 C160,80 240,80 240,110 C240,120 230,125 200,125 C170,125 160,120 160,110 Z" fill="none" stroke="#d1d5db" stroke-width="4"/>
  <path d="M110,135 L200,125 L290,135" fill="none" stroke="#9ca3af" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Shirt Body Base -->
  <path d="M130,132 L150,190 L120,240 L150,350 L250,350 L280,240 L250,190 L270,132 L200,145 Z" fill="url(#patternGrad)"/>
  
  <!-- Polka Dot Overlay -->
  <path d="M130,132 L150,190 L120,240 L150,350 L250,350 L280,240 L250,190 L270,132 L200,145 Z" fill="url(#dots)" opacity="0.6"/>
  
  <!-- Collar -->
  <path d="M170,132 L200,165 L230,132 L200,145 Z" fill="#312e81"/>
  
  <!-- Elegant Title -->
  <text x="200" y="380" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#4338ca" text-anchor="middle">MODERN PATTERNED</text>
</svg>
