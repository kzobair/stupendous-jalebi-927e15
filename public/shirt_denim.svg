<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="denimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f1f5f9"/>
  
  <!-- Hanger -->
  <path d="M160,110 C160,80 240,80 240,110 C240,120 230,125 200,125 C170,125 160,120 160,110 Z" fill="none" stroke="#d1d5db" stroke-width="4"/>
  <path d="M110,135 L200,125 L290,135" fill="none" stroke="#9ca3af" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Denim Shirt Body -->
  <path d="M130,132 L150,190 L120,240 L150,350 L250,350 L280,240 L250,190 L270,132 L200,145 Z" fill="url(#denimGrad)"/>
  
  <!-- Collar -->
  <path d="M170,132 L200,165 L230,132 L200,145 Z" fill="#1e3a8a"/>
  
  <!-- Contrast Stitching & Buttons -->
  <line x1="200" y1="165" x2="200" y2="350" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 4"/>
  <circle cx="200" cy="200" r="4" fill="#f59e0b"/>
  <circle cx="200" cy="240" r="4" fill="#f59e0b"/>
  <circle cx="200" cy="280" r="4" fill="#f59e0b"/>
  <circle cx="200" cy="320" r="4" fill="#f59e0b"/>
  
  <!-- Pocket -->
  <path d="M155,200 L185,200 L185,230 L170,245 L155,230 Z" fill="#1e40af" stroke="#f59e0b" stroke-width="1"/>
  
  <!-- Elegant Title -->
  <text x="200" y="380" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1e3a8a" text-anchor="middle">CLASSIC DENIM &amp; CASUAL</text>
</svg>
